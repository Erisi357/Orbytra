<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Monda:wght@400;700&family=Play:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../style.css">
  <link rel="shortcut icon" href="../img/logo.png" type="image/x-icon">
  <title>Clicker Game | Orbytra</title>
</head>
<body>

    <section class="container py-5 mt-5">
        <div class="text-center py-5">
            <h1 class="display-4 fw-bold font-play text-white mb-4">Orb Dust Clicker Game</h1>
            <p class="fs-5 font-monda text-white opacity-75 mb-5">Click the button to earn Orb Dust! Reach 100 clicks to get a reward.</p>
            
            <div class="card bg-dark text-white mx-auto" style="max-width: 500px;">
                <p class="text-white fs-5 mb-4 mt-2">Orb Dust: <span class="text-gradient" id="orb-amount">0</span></p>
                <div class="card-body">
                    <h5 class="card-title font-orbitron">Click Counter</h5>
                    <div class="display-1 font-orbitron text-gradient mb-4" id="click-count">0</div>
                    
                    <button class="btn btn-gradient btn-lg px-5 py-3 rounded-pill mb-4" id="click-btn">
                        Click Me!
                    </button>
                    
                    <div class="alert alert-success d-none" id="reward-alert" role="alert">
                        <strong>Congratulations!</strong> You've earned 10 Orb Dust for reaching 100 clicks!
                    </div>
                    
                    <p class="text-white small">Keep clicking to earn more rewards!</p>
                </div>
            </div>
        </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="../JS/app.js"></script>
</body>
</html>
