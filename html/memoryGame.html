<!DOCTYPE html>
<html style="height: 100%;">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<link rel="stylesheet" type="text/css" href="../style.css">
	<link rel="shortcut icon" href="../img/logo.png" type="image/x-icon">
	<title>Memory Game</title>
</head>
<body style="height: 100%; background-image: url(../img/memGameBackground.png); background-repeat: no-repeat; background-size: 100%;">
	<header style="height: 6%;">
		<div class="backButton">
			<a href="quests.html">Back</a>
		</div>
	</header>

	<div class="game">
		<div class="cards">
			<div class="card">
				<img class="cardImage" src="../img/card.png">
			</div>

			<div class="card">
				<img class="cardImage" src="../img/card.png">
			</div>

			<div class="card">
				<img class="cardImage" src="../img/card.png">
			</div>

			<div class="card">
				<img class="cardImage" src="../img/card.png">
			</div>

			<div class="card">
				<img class="cardImage" src="../img/card.png">
			</div>

			<div class="card">
				<img class="cardImage" src="../img/card.png">
			</div>

			<div class="card">
				<img class="cardImage" src="../img/card.png">
			</div>

			<div class="card">
				<img class="cardImage" src="../img/card.png">
			</div>

			<div class="card">
				<img class="cardImage" src="../img/card.png">
			</div>

			<div class="card">
				<img class="cardImage" src="../img/card.png">
			</div>

			<div class="card">
				<img class="cardImage" src="../img/card.png">
			</div>

			<div class="card">
				<img class="cardImage" src="../img/card.png">
			</div>

			<div class="card">
				<img class="cardImage" src="../img/card.png">
			</div>

			<div class="card">
				<img class="cardImage" src="../img/card.png">
			</div>

			<div class="card">
				<img class="cardImage" src="../img/card.png">
			</div>

			<div class="card">
				<img class="cardImage" src="../img/card.png">
			</div>
		</div>

		<div class="map">
			<h1 id="pairsFoundTracker">Pairs found:<span>0</span></h1>
			<p id="orb-dust" class="text-white mb-0 fs-5 font-orbitron">Orb Dust: <span style="font-size: 19px;" id="orb-amount" class="text-gradient fs-5">0</span></p>
		</div>
	</div>

	<script>
		// memory game

		// =======================
		// SELECT ELEMENTS
		// =======================

		const cards = document.querySelectorAll(".card");
		const scoreDisplay = document.querySelector(".map span");

		// =======================
		// GAME STATE VARIABLES
		// =======================

		let firstCard = null;
		let secondCard = null;
		let lockBoard = false;
		let pairsFound = 0;
		const maxOrbsReward = 100;
		const maxPairsFound = 8;

		// =======================
		// CREATE PAIRS
		// =======================

		// 8 pairs for 16 cards
		const images = [
		"img1.png",
		"img2.png",
		"img3.png",
		"img4.png",
		"img5.png",
		"img6.png",
		"img7.png",
		"img8.png",
		];

		// duplicate array -> pairs
		const gameImages = [...images, ...images];

		// shuffle
		gameImages.sort(() => Math.random() - 0.5);

		// =======================
		// ASSIGN IMAGES TO CARDS
		// =======================

		cards.forEach((card, index) => {
		const img = card.querySelector("img");

		// card back image (default)
		img.src = "../img/card.png";

		// store hidden image
		card.dataset.image = "../img/" + gameImages[index];

		// click listener
		card.addEventListener("click", flipCard);
		});

		// =======================
		// FLIP CARD
		// =======================

		function flipCard() {
		if (lockBoard) return;
		if (this === firstCard) return;

		const img = this.querySelector("img");

		// show real image
		img.src = this.dataset.image;

		if (!firstCard) {
			firstCard = this;
			return;
		}

		secondCard = this;
		lockBoard = true;

		checkMatch();
		}

		// =======================
		// CHECK MATCH
		// =======================

		function checkMatch() {
		const isMatch = firstCard.dataset.image === secondCard.dataset.image;

		if (isMatch) {
			disableCards();
		} else {
			unflipCards();
		}
		}

		// =======================
		// MATCH FOUND
		// =======================

		function disableCards() {
		firstCard.removeEventListener("click", flipCard);
		secondCard.removeEventListener("click", flipCard);

		pairsFound++;
		scoreDisplay.textContent = pairsFound;
		rewardOrbs();

		resetBoard();
		}

		// =======================
		// NOT MATCHED
		// =======================

		function unflipCards() {
		setTimeout(() => {
			firstCard.querySelector("img").src = "../img/card.png";
			secondCard.querySelector("img").src = "../img/orb.png";

			resetBoard();
		}, 800);
		}

		// =======================
		// RESET TURN
		// =======================

		function resetBoard() {
		firstCard = null;
		secondCard = null;
		lockBoard = false;
		}

		function rewardOrbs() {
		if (pairsFound == maxPairsFound) {
			orbDust += maxOrbsReward;
			localStorage.setItem("orbDust", orbDust);
			if (document.getElementById("orb-amount")) {
			document.getElementById("orb-amount").textContent = orbDust;
			}
			alert(`You have earned ${maxOrbsReward} Orb Dusts!`);
		}
		}
	</script>
</body>
</html>
