<!DOCTYPE html>
<html style="height: 100%;">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<link rel="stylesheet" type="text/css" href="../style.css">
	<title>Orbytra Survey</title>
</head>
<body class="surveyBody">
	<form class="questBody" style="align-items: flex-start; justify-content: center; flex-direction: column;">
		<h1 style="margin-top: 0px;" class="label">Are you satisfied with the amount of payout you earn through our earn system?<span class="red">*</span></h1>
		<label class="choice">
			<input type="radio" name="question1" value="A">
			<span>No</span>
		</label>

		<label class="choice">
			<input type="radio" name="question1" value="B">
			<span>Somewhat</span>
		</label>

		<label class="choice">
			<input type="radio" name="question1" value="C">
			<span>Moderately</span>
		</label>

		<label class="choice">
			<input type="radio" name="question1" value="D">
			<span>Yes</span>
		</label>

		<h1 class="label">What games would you add to our system, if any?</h1>
		<input class="textInput" type="text" name="games">

		<h1 class="label">Would you be interested in survey's like this in the future?<span class="red">*</span></h1>

		<label class="choice">
			<input type="radio" name="question2" value="A">
			<span>No</span>
		</label>

		<label class="choice">
			<input type="radio" name="question2" value="B">
			<span>Maybe</span>
		</label>

		<label class="choice">
			<input type="radio" name="question2" value="C">
			<span>Yes</span>
		</label>

		<h4><span class="red">*</span>: Must be answered</h4>

		<button style="padding: 8px; font-family: 'Play', sans-serif;" class="btn">Submit</button>
	</form>
</body>
</html>
