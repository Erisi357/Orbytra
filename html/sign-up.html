<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Monda:wght@400;700&family=Play:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../style.css" />
    <title>Sign Up | Orbytra</title>
</head>

<body> 
  
  <div class="container d-flex justify-content-center align-items-center min-vh-100">
        
        <div class="card p-4 shadow-lg border-0 bg-white" style="max-width: 400px; width: 100%; border-radius: 15px;">
            <div class="card-body text-center">
                
                <h2 class="text-gradient fw-bold mb-1 font-orbitron">Join Orbytra</h2>
                <p class="text-muted small mb-4">Start your collection today</p>

                <form id="signup-form">
                    
                    <div class="mb-3 text-start">
                        <label for="reg-email" class="form-label text-dark fw-semibold small">Email Address</label>
                        <input type="email" 
                               id="reg-email" 
                               class="form-control border-light-subtle bg-light" 
                               placeholder="name@example.com" 
                               required />
                    </div>

                    <div class="mb-4 text-start">
                        <label for="reg-password" class="form-label text-dark fw-semibold small">Password</label>
                        <input type="password" 
                               id="reg-password" 
                               class="form-control border-light-subtle bg-light" 
                               placeholder="••••••••" 
                               required />
                    </div>

                    <div class="p-3 mb-4 rounded bg-light border text-start">
                        <p class="mb-2 small fw-bold text-dark">Requirements:</p>
                        <ul class="small text-muted mb-0 ps-3">
                            <li id="req-length" class="text-danger">At least 8 characters</li>
                            <li id="req-special" class="text-danger">One special character (@, $, !)</li>
                            <li id="req-number" class="text-danger">One number (0-9)</li>
                        </ul>
                    </div>

                    <button type="submit" id="sign-up-btn" class="btn btn-gradient w-100 py-2 fw-bold rounded-pill shadow-sm">
                        Create Account
                    </button>
                    
                </form>

                <p class="mt-4 mb-0 small text-muted">
                    Already have an account?
                    <a href="sign-in.html" class="text-primary fw-bold text-decoration-none">Sign In</a>
                </p>

            </div>
        </div>
    </div>

    <script type="module" src="app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
