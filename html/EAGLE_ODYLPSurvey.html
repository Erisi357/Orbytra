<!DOCTYPE html>
<html style="height: 100%;">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<link rel="stylesheet" type="text/css" href="../style.css">
	<title>ODYLP EAGLE Host Family Survey</title>
</head>
<body class="surveyBody">
	<form class="questBody" style="align-items: flex-start; justify-content: center; flex-direction: column;">
		<h1 style="margin-top: 0px;" class="label">During your stay in your host family you felt out of place and unwanted.<span class="red">*</span></h1>
		<label class="choice">
			<input type="radio" name="question1" value="A">
			<span>Agree</span>
		</label>

		<label class="choice">
			<input type="radio" name="question1" value="B">
			<span>Slightly agree</span>
		</label>

		<label class="choice">
			<input type="radio" name="question1" value="C">
			<span>Slightly disagree</span>
		</label>

		<label class="choice">
			<input type="radio" name="question1" value="D">
			<span>Disagree</span>
		</label>

		<h1 class="label">How would you describe your experience in your host family?</h1>
		<input class="textInput" type="text" name="games">

		<h1 class="label">You feel as if your host family only signed up for the tax benifits.<span class="red">*</span></h1>

		<label class="choice">
			<input type="radio" name="question2" value="A">
			<span>Agree</span>
		</label>

		<label class="choice">
			<input type="radio" name="question2" value="B">
			<span>Unsure</span>
		</label>

		<label class="choice">
			<input type="radio" name="question2" value="C">
			<span>Disagree</span>
		</label>

		<h4><span class="red">*</span>: Must be answered</h4>

		<button style="padding: 8px; font-family: 'Play', sans-serif;" class="btn">Submit</button>
	</form>
</body>
</html>
