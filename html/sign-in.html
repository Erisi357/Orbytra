<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign In | Orbytra</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Monda:wght@400;700&family=Play:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../style.css" />
</head>

<body> 
  <div class="container d-flex justify-content-center align-items-center min-vh-100">
        
        <div class="card p-4 shadow-lg border-0 bg-white" style="max-width: 400px; width: 100%; border-radius: 15px;">
            <div class="card-body text-center">
                
                <h2 class="text-gradient fw-bold mb-3 fs-2 font-orbitron">Welcome Back</h2>

                <form id="signin-form">
                    
                    <div class="mb-3 text-start">
                        <label for="reg-email" class="form-label text-dark fw-semibold small">Email Address</label>
                        <input type="email" 
                               id="reg-email" 
                               class="form-control border-light-subtle bg-light" 
                               placeholder="Enter your email" 
                               required />
                    </div>

                    <div class="mb-4 text-start">
                        <label for="reg-password" class="form-label text-dark fw-semibold small">Password</label>
                        <input type="password" 
                               id="reg-password" 
                               class="form-control border-light-subtle bg-light" 
                               placeholder="••••••••" 
                               required />
                    </div>

                    <button type="submit" id="sign-in-btn" class="btn btn-gradient w-100 py-2 fw-bold rounded-pill shadow-sm">
                        Sign In
                    </button>
                    
                </form>

                <p class="mt-4 mb-0 small text-muted">
                    Don't have an account?
                    <a href="sign-up.html" class="text-primary fw-bold text-decoration-none">Sign Up</a>
                </p>

            </div>
        </div>
    </div>

    <script type="module" src="app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
