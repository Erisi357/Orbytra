<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="../style.css" />
    <title>Sign In in Orbytra</title>
  </head>
  <body>
    <div
      class="container d-flex justify-content-center align-items-center"
      style="min-height: 100vh"
    >
      <div
        class="card p-4 shadow-lg border-0 bg-white"
        style="width: 100%; max-width: 400px; border-radius: 15px"
      >
        <div class="card-body text-center">
          <h2 class="text-gradient fw-bold mb-3 fs-2">Welcome Back</h2>

          <form id="signin-form">
            <div class="mb-3 text-start">
              <label
                for="reg-email"
                class="form-label text-dark fw-semibold small"
                >Email Address</label
              >
              <input
                type="email"
                class="form-control border-light-subtle bg-light"
                id="reg-email"
                placeholder="Enter your email"
                required
              />
            </div>

            <div class="mb-3 text-start">
              <label
                for="reg-username"
                class="form-label text-dark fw-semibold small"
                >Password</label
              >
              <input
                type="password"
                class="form-control border-light-subtle bg-light"
                id="reg-password"
                placeholder="••••••••"
                required
              />
            </div>

            <button
              type="submit"
              class="btn btn-gradient w-100 py-2 fw-bold rounded-pill shadow-sm"
              id="sign-in-btn"
            >
              Sign In
            </button>
          </form>

          <p class="mt-4 mb-0 small text-muted">
            Don't have an account?
            <a
              href="sign-up.html"
              class="text-primary fw-bold text-decoration-none"
              >Sign Up</a
            >
          </p>
        </div>
      </div>
    </div>

    <script type="module" src="app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
