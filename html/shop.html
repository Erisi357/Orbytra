<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Monda:wght@400;700&family=Play:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../style.css">
  <title>Shop | Orbytra</title>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-custom fixed-top p-2">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold text-gradient font-orbitron ms-2 fs-3" href="../index.html">ORBYTRA</a>
            
            <button class="navbar-toggler bg-light" type="button" data-bs-toggle="collapse" data-bs-target="#mainNavbar">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="mainNavbar">
                <ul class="navbar-nav mx-auto mb-2 mb-lg-0 fs-5">
                    <li class="nav-item"><a class="nav-link font-play text-white active" href="../index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link font-play text-white" href="/html/about.html">About</a></li>
                    <li class="nav-item"><a class="nav-link font-play text-white" href="/html/shop.html">Shop</a></li>
                    <li class="nav-item"><a class="nav-link font-play text-white" href="/html/quests.html">Quests</a></li>
                </ul>

                <div class="d-flex align-items-center gap-3 me-3">
                    <a href="/html/sign-in.html" class="nav-link text-white font-orbitron px-3 text-decoration-none">Sign In</a>
                    <a href="/html/sign-up.html" class="btn btn-gradient font-orbtiron px-4 rounded-pill">SIGN UP</a>
                </div>
            </div>
        </div>
    </nav>

    <section class="container py-5 mt-5">
        <div class="p-5 mb-4 bg-dark text-white rounded-5 shadow-lg">
            <div class="row align-items-center g-5 py-5">
                <div class="col-lg-7 text-center text-lg-start">
                    <h1 class="display-3 fw-bold font-play mb-3">Epic Gear & <br>Limited Items!</h1>
                    <p class="fs-4 font-monda opacity-75 mb-4">Boost your collection with unique assets!</p>
                    <button class="btn btn-gradient btn-lg px-5 rounded-pill">Shop Featured</button>
                </div>
                <div class="col-lg-5 text-center">
                    <div class="bg-secondary rounded-4 py-5 opacity-25"></div>
                </div>
            </div>
        </div>
    </section>

    <section class="container mb-5">
        <div class="row g-4">
            
            <aside class="col-lg-3">
                <div class="p-4 bg-white border rounded-4 sticky-top" style="top: 100px;">
                    <h5 class="fw-bold font-play mb-4 text-dark">Categories</h5>
                    
                    <div class="form-check mb-3">
                        <input class="form-check-input" type="checkbox" id="cat1">
                        <label class="form-check-label font-monda" for="cat1">Avatars</label>
                    </div>
                    <div class="form-check mb-3">
                        <input class="form-check-input" type="checkbox" id="cat2">
                        <label class="form-check-label font-monda" for="cat2">Gear</label>
                    </div>

                    <hr class="my-4">

                    <h5 class="fw-bold font-play mb-3 text-dark">Sort By</h5>
                    <select class="form-select border-light-subtle bg-light font-monda">
                        <option>Newest</option>
                        <option>Price: Low to High</option>
                        <option>Price: High to Low</option>
                    </select>
                </div>
            </aside>

            <main class="col-lg-9">
                <h3 class="fw-bold font-play mb-4 text-dark">New Releases</h3>
                
                <div class="row row-cols-1 row-cols-md-2 row-cols-xl-3 g-4">
                    
                    <div class="col">
                        <div class="card h-100 p-3 border-0 shadow-sm rounded-4 text-center bg-white">
                            <div class="bg-light rounded-3 mb-3 py-5 opacity-50">Item Photo</div>
                            <div class="card-body p-0 d-flex flex-column">
                                <h5 class="fw-bold font-play text-dark">Shadow Wings</h5>
                                <p class="small text-muted font-monda mb-3">Epic rarity back item</p>
                                <div class="d-flex justify-content-between align-items-center mt-auto border-top pt-3">
                                    <span class="fw-bold text-dark">500 Orbs</span>
                                    <button class="btn btn-sm btn-outline-dark rounded-pill px-3">Add</button>
                                </div>
                            </div>
                        </div>
                    </div>

                    </div>
            </main>
        </div>
    </section>

    <footer class="bg-dark text-white py-4">
        <div class="container text-center">
            <p class="small opacity-50 mb-0">© 2026 ORBYTRA | Orbs have no real-world value.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="../JS/app.js"></script>
</body>
</html>
